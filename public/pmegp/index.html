    <meta property="og:description" content="प्रधानमंत्री रोजगार सृजन कार्यक्रम (PMEGP) भारत सरकार के सूक्ष्म, लघु एवं मध्यम उद्यम मंत्रालय (MSME) द्वारा संचालित एक क्रेडिट-लिंक्ड सब्सिडी योजना है, जिसका उद्देश्य देश में स्वरोजगार और रोजगार सृजन को बढ़ावा देना है। इस योजना का क्रियान्वयन खादी एवं ग्रामोद्योग आयोग (KVIC) द्वारा किया जाता है। PMEGP के तहत 18 वर्ष या उससे अधिक आयु के पात्र आवेदक नए सूक्ष्म उद्यम स्थापित करने के लिए बैंक ऋण एवं सरकारी सब्सिडी का लाभ प्राप्त कर सकते हैं। सामान्य वर्ग के लाभार्थियों को परियोजना लागत का 10% तथा विशेष वर्ग के लाभार्थियों को 5% स्वयं का योगदान करना होता है। योजना के अंतर्गत सामान्य वर्ग को 15% से 25% तथा विशेष वर्ग को 25% से 35% तक सब्सिडी प्रदान की जाती है। विनिर्माण क्षेत्र के लिए अधिकतम परियोजना लागत ₹50 लाख तथा सेवा/व्यवसाय क्षेत्र के लिए ₹20 लाख निर्धारित है। इच्छुक उम्मीदवार ऑनलाइन या ऑफलाइन माध्यम से आवेदन कर सकते हैं। यह योजना बेरोजगार युवाओं, कारीगरों और उद्यमियों को अपना व्यवसाय शुरू करने के लिए वित्तीय सहायता प्रदान करती है।">
