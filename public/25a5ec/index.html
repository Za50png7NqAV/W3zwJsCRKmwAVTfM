    <meta property="og:description" content="Oil and Natural Gas Corporation Limited (ONGC) has released the official notification for Apprentice Recruitment 2025 under the Apprentices Act, 1961. A total of 2743 vacancies have been announced across India in various sectors such as Northern, Western, Eastern, Southern, Mumbai, and Central.Eligible candidates with ITI, Diploma, or Graduate qualifications can apply for trades like Fitter, Electrician, Computer Operator, Lab Chemist, Mechanical Executive, Accounts Executive, and others. The online application process began on 16/10/2025 and will continue till 06/11/2025 through the official ONGC Apprentice portal – ongcapprentices.ongc.co.in. Selection will be based on merit of qualifying exam marks, and no examination fee is required. Selected apprentices will receive a monthly stipend up to ₹12,300 during the 12-month training period.">
