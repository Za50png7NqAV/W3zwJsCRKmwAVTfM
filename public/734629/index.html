    <meta property="og:description" content="UGC NET June 2026 is conducted by the National Testing Agency (NTA) to determine the eligibility of candidates for Assistant Professor, Junior Research Fellowship (JRF), and Ph.D admission. The online application process starts from 29 April 2026 and continues until 20 May 2026. Candidates must have a Master’s Degree in the relevant subject with at least 55% marks for General/EWS and 50% for reserved categories. The examination will be held from 22 June to 30 June 2026 in CBT (Computer Based Test) mode. Interested candidates can apply online through the official website.">
