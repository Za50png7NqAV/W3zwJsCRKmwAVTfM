    <meta property="og:description" content="VB-G RAM-G (Viksit Bharat Guarantee for Rozgar and Ajeevika Mission – Gramin) भारत सरकार की नई ग्रामीण रोजगार योजना है, जो MGNREGA की जगह लाई गई है। इसका उद्देश्य ग्रामीण परिवारों को प्रति वर्ष 125 दिन का रोजगार, जल सुरक्षा और ग्रामीण इंफ्रास्ट्रक्चर जैसी उत्पादक संपत्तियों का निर्माण, और तकनीक-आधारित पारदर्शी कार्यान्वयन के माध्यम से गांवों को विकसित भारत @2047 के लक्ष्य से जोड़ना है। हालांकि रोजगार के दिन बढ़े हैं, लेकिन योजना बजट-कैप्ड और प्लान-बेस्ड होने के कारण अधिकार-आधारित सुरक्षा, बेरोजगारी भत्ता और यूनिवर्सल कवरेज को लेकर चिंताएँ भी सामने आई हैं।">
