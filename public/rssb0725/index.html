    <meta property="og:description" content="Rajasthan Staff Selection Board (RSMSSB) has released the official notification for Jamadar Grade-II Recruitment 2025 under the Public Works Department (PWD). A total of 72 posts are available — 64 for Non-Scheduled Area and 8 for Scheduled Area. Eligible candidates who have passed Senior Secondary (12th) and possess a valid computer qualification (like RSCIT, DOEACC “O” Level, COPA, or Diploma in Computer Science) can apply online. The online application process will be active from 17/10/2025 to 15/11/2025, and the OMR-based exam will be conducted on 27/12/2025.">
