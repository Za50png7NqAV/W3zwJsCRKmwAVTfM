    <meta property="og:description" content="The Northeast Frontier Railway (NFR) has released the notification for Sports Quota Recruitment 2025-26 with a total of 56 vacancies across Level 1 to Level 5 posts. Eligible Indian sportspersons can apply online from 16 September 2025 to 15 October 2025. The recruitment is open in various sports disciplines including athletics, boxing, cricket, football, volleyball, weightlifting, basketball, archery, and more. Candidates will be selected based on their sports performance and trials, as no written exam will be conducted. The application fee is ₹500 for General candidates and ₹250 for SC/ST/Women/Minority/EBC, with partial refund available after appearing in trials.">
