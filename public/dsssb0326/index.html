    <meta property="og:description" content="Delhi Subordinate Services Selection Board (DSSSB) has released Advertisement No. 03/2026 for the recruitment of 1979 vacancies in various departments of the Government of NCT of Delhi. The recruitment includes posts such as Junior Scientific Assistant, IT Assistant, TGT (Computer Science), Domestic Science Teacher, Special Educator, Data Entry Operator, Lift Operator, Electrical Overseer and others. Online applications will be accepted from 16/06/2026 to 15/07/2026 through the official DSSSB website. Candidates must check the post-wise eligibility criteria, age limit, application fee, selection process and reservation details before applying. Selection will be based on a One Tier Computer Based Examination with negative marking as per DSSSB rules.">
