    <meta property="og:description" content="The State Bank of India (SBI) has released the SBI SCO Recruitment 2026 notification for 116 Specialist Cadre Officer posts, including Assistant Vice President (IS Audit) and Deputy Manager (IS Audit and CA–Internal Audit). The online application process started on 23/02/2026 and will remain open until 15/03/2026. The selection will be based on shortlisting and interview only. The AVP post is contractual with a CTC up to ₹50 lakh, while the Deputy Manager posts are regular in MMGS-II scale. Candidates must meet the prescribed educational qualifications, relevant experience, and age criteria (21 to 45 years, depending on the post). The application fee is ₹750 for General/EWS/OBC candidates, while SC/ST/PwBD candidates are exempted from paying the fee.">
