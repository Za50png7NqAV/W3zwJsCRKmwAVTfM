    <meta property="og:description" content="Jawahar Navodaya Vidyalaya Samiti (NVS) has invited applications for Class IX Lateral Entry Admission 2026-27 against vacant seats through a selection test. The exam will be conducted on 7th February 2026 at designated JNVs of respective districts. Eligible students studying in Class VIII during 2025-26 in Government or Government-recognized schools of the same district, and born between 1st May 2011 to 31st July 2013, can apply online at navodaya.gov.in till 23rd September 2025. Admission will be offered strictly on merit basis and is subject to passing Class VIII along with verification of residence, date of birth, and other required documents.">
