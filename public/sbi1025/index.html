    <meta property="og:description" content="The State Bank of India (SBI) has announced the SBI SCO Recruitment 2025 for a total of 59 Specialist Cadre Officer vacancies on a regular basis, including the posts of Manager (MMGS-III) and Deputy Manager (MMGS-II) in the Digital Platforms domain. Candidates must hold a B.E./B.Tech. in IT, Computer Science, Electronics, Electrical, or related fields, or an MCA with at least 60% marks, while an MBA is preferred. Relevant work experience of 5 years for Manager and 3 years for Deputy Manager in Digital Payments, FinTech, CRM, or related fields is mandatory. The age limit is 28–35 years for Manager and 25–32 years for Deputy Manager (as on 31.08.2025). The application fee is ₹750 for General, OBC, and EWS candidates, while SC, ST, and PwBD candidates are exempted. The selection process will be based on shortlisting and interview. Eligible candidates can apply online from 11th September to 2nd October 2025 through the official SBI Careers website.">
