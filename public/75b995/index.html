    <meta property="og:description" content="Council of Scientific &amp; Industrial Research (CSIR) has released the Assistant Section Officer (ASO) Recruitment 2026 notification for 100 vacancies in General, Finance &amp; Accounts, and Stores &amp; Purchase cadres. Eligible candidates who possess a Bachelor&rsquo;s Degree and are non-recommended candidates of UPSC Civil Services Examination (CSE) 2024 can apply online from 23/06/2026 to 13/07/2026. The upper age limit is 33 years with relaxation for reserved categories as per rules. The application fee is ₹500 for UR/OBC/EWS candidates, while SC/ST/PwBD/Women/Ex-Servicemen candidates are exempted. Selection will be based on UPSC CSE 2024 marks and a qualifying Computer Proficiency Test (CPT).">
