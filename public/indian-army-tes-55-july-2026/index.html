    <meta property="og:description" content="The Indian Army has released the TES-55 (10&#43;2 Technical Entry Scheme) notification for July 2026 batch. Unmarried male candidates who have passed Class 12 (PCM) with minimum 60% marks and have appeared in JEE (Main) 2025 can apply. A total of 90 vacancies are available under this entry. The online application is open from 14/10/2025 to 13/11/2025 at www.joinindianarmy.nic.in. Selected candidates will undergo 4 years of training (3 years at CTW &#43; 1 year at IMA Dehradun) and will be commissioned as Lieutenants with a starting pay level of ₹56,100/- (Level 10). No application fee is required — candidates can apply free of cost.">
