    <meta property="og:description" content="मुख्यमंत्री जनकल्याण (संबल) योजना मध्य प्रदेश सरकार की एक कल्याणकारी योजना है, जिसका उद्देश्य असंगठित क्षेत्र के श्रमिकों और उनके परिवारों को सामाजिक सुरक्षा प्रदान करना है। योजना के अंतर्गत पात्र श्रमिकों को सामान्य एवं दुर्घटना मृत्यु सहायता, विकलांगता सहायता, प्रसूति सहायता, अंत्येष्टि सहायता तथा बच्चों की उच्च शिक्षा हेतु आर्थिक सहायता का लाभ दिया जाता है। 18 से 60 वर्ष आयु के पात्र श्रमिक, जिनकी पारिवारिक आय ₹2.5 लाख से कम है और जो निर्धारित शर्तों को पूरा करते हैं, संबल कार्ड बनवाकर योजना का लाभ प्राप्त कर सकते हैं।">
