    <meta property="og:description" content="Bihar Public Service Commission (BPSC) invites online applications for 54 posts of Assistant Public Sanitation &amp; Waste Management Officer under the Department of Urban Development &amp; Housing, Bihar. Candidates from all states of India, both male and female, are eligible. Required qualifications include a Bachelor’s degree in Chemistry/Environmental Science, B.E./B.Tech in Chemical/Civil/Environmental Science/Public Health Engineering/Biotechnology, or a degree in Planning/Architecture. Age limit (as of 01.08.2025) is 21–37 years for unreserved males, 21–40 years for unreserved females/OBC/EBC, and 21–42 years for SC/ST. Application fee is ₹100 (plus ₹200 biometric fee if Aadhaar is not provided). Apply online between 05.09.2025 and 30.09.2025 at www.bpsc.bihar.gov.in">
