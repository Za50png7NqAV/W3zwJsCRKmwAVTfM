    <meta property="og:description" content="The Uttar Pradesh Police Recruitment and Promotion Board (UPPRPB) has issued the official notification for Police Sub Inspector (Confidential) and Police Assistant Sub Inspector (Clerk and Accounts) posts for the year 2025. Released under Advertisement No. PRPB-B (Cl.)/2025, the recruitment includes a total of 537 vacancies. Online applications will be accepted from 20/12/2025 to 19/01/2026. Selection of candidates will be based on a written examination, followed by skill test wherever applicable, document verification and medical examination. Physical Standard Test (PST) will be conducted, and no Physical Efficiency Test (PET) is included.">
