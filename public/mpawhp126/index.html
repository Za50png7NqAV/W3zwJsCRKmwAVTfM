    <meta property="og:description" content="The Directorate of Women and Child Development, Madhya Pradesh has released the MP Anganwadi Recruitment 2026 Notification for the recruitment of 2,548 vacancies, including 781 Anganwadi Worker and 1,767 Anganwadi Assistant posts. Eligible female candidates who have passed 12th Class and are residents of the same Gram Panchayat (rural) or same Ward (urban) where the vacancy is available can apply online through the MP Online Selection Portal. The online application process will be conducted from 01 July 2026 to 13 July 2026, with corrections allowed until 15 July 2026. Candidates must be 18 to 35 years of age as on 01 January 2026 and pay an application fee of ₹100 &#43; 18% GST.">
