    <meta property="og:description" content="Haryana Public Service Commission (HPSC) has released the notification for the recruitment of 785 Agricultural Development Officer (ADO) posts under the Administrative Cadre (Group-B) in the Agriculture and Farmers Welfare Department, Haryana. Candidates possessing a B.Sc. (Hons) in Agriculture and having studied Hindi or Sanskrit up to Matric or higher are eligible to apply. The online application process will begin on 5th August 2025 and will remain open until 25th August 2025 (up to 5:00 PM). Applicants must be between 18 to 42 years of age as on 01 July 2025. The selected candidates will be placed in Pay Level-6 of the 7th CPC pay matrix, with a salary range of ₹35,400 to ₹1,12,400. All 27 PwBD reserved posts are included in the total of 785 vacancies. Interested candidates can apply through the official HPSC website at hpsc.gov.in. Category-wise vacancy breakup, reservation rules, fee details, and application instructions are available in the official notification.">
