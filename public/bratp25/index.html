    <meta property="og:description" content="The Bihar Public Service Commission (BPSC) has announced 35 vacancies for Assistant Town Planner (ATP) under Advertisement No. 89/2025 in the Urban Development &amp; Housing Department. The online application process will be open from 28th August 2025 to 22nd September 2025 on the official BPSC website. Candidates with a Post Graduate degree in Town Planning, Regional/Urban Planning, City Planning, Country/Transport Planning, Housing, or Environmental Planning are eligible to apply. The selection will be based on a written examination and interview, and appointed candidates will receive a salary under Pay Level 09 (₹53,100 – ₹1,67,800) along with allowances.">
