    <meta property="og:description" content="Delhi Subordinate Services Selection Board (DSSSB) has released Advertisement No. 01/2026 for a total of 911 vacancies under Combined Examination 2026 for the posts of Legal Assistant, Assistant Engineer (Civil), Junior Engineer (Civil), and Grade-II (GNCTDSS) / Assistant Section Officer in various departments of the Government of NCT of Delhi. The online application process will start from 24/02/2026 and the last date to apply is 25/03/2026 through the official online portal. The selection will be conducted through a Computer Based Examination (One Tier or Two Tier depending on the post) with negative marking. The required qualification varies post-wise such as Law Degree for Legal Assistant, Civil Engineering Degree/Diploma for AE and JE, and Bachelor’s Degree for ASO, with the age limit generally up to 30 years and relaxation applicable as per government rules.">
