    <meta property="og:description" content="RRC Central Railway is inviting online applications for 2,418 Apprentice posts under various trades in Mumbai, Bhusawal, Pune, Nagpur, and Solapur divisions. Eligible candidates must have passed 10th with at least 50% marks and possess an ITI certificate in the relevant trade. The application window is open from 12 August to 11 September 2025. Selection will be based on merit from Class 10 and ITI marks. A stipend of ₹7,000 per month will be provided during the 1-year training. Apply only through the official website rrccr.com.">
