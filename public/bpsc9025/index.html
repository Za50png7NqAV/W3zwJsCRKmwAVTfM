    <meta property="og:description" content="Bihar Public Service Commission (BPSC) has announced 33 vacancies for the posts of District Sports Officer, Assistant Director (Sports/Youth), and Lecturer (SH &amp; Colleges) under the Bihar Sports Service Cadre through Advt. No. 90/2025. Candidates with a Graduate Degree and a Diploma/PG Diploma in Sports Coaching from a recognized institute are eligible to apply. The online application window will remain open from 02 September 2025 to 30 September 2025, and applicants need to pay a fee of ₹100/- plus bank charges. This is a good opportunity for candidates with sports coaching qualifications to build their career in the Bihar Sports Department.">
