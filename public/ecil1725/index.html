    <meta property="og:description" content="Electronics Corporation of India Limited (ECIL) has invited applications for 160 Technical Officer posts on contract basis through Advt. No. 17/2025. The contract is initially for 9 months and extendable up to 4 years based on project needs. Candidates with BE/B.Tech. in ECE, EEE, CSE, IT, Mechanical and related disciplines with minimum 1-year post-qualification experience are eligible. The salary ranges from ₹25,000 to ₹31,000 per month along with PF, TA/DA, paid leave and medical benefits. The selection will be done on the basis of academic marks, work experience and personal interview (no written exam). The online application window will remain open from 16th September to 22nd September 2025 at www.ecil.co.in">
