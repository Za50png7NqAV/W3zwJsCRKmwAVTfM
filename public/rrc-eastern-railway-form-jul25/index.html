    <meta property="og:description" content="The Railway Recruitment Cell (RRC), Eastern Railway, Kolkata has released the official notification for Apprentice Recruitment 2025 for a total of 3115 trade-wise vacancies. The recruitment is open for various divisions and workshops including Howrah, Sealdah, Asansol, Malda, Liluah, Jamalpur, and Kanchrapara. Candidates who have passed Class 10th and possess an ITI certificate in the relevant trade are eligible to apply. The age of the applicant should be between 15 and 24 years. The selection will be based purely on merit, considering the marks obtained in 10th and ITI – no written exam will be conducted. Applications must be submitted online through the official RRC ER website within the prescribed dates.">
