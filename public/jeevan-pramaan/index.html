    <meta property="og:description" content="जीवन प्रमाण पत्र (Jeevan Pramaan / Life Certificate) एक आधिकारिक प्रमाण पत्र है, जिसके माध्यम से यह पुष्टि की जाती है कि पेंशन प्राप्त करने वाला व्यक्ति जीवित है। इसे मुख्य रूप से सरकारी पेंशनभोगियों को हर वर्ष जमा करना होता है ताकि उनकी पेंशन बिना किसी रुकावट के जारी रह सके। भारत सरकार ने इस प्रक्रिया को आसान बनाने के लिए Digital Life Certificate (Jeevan Pramaan) की सुविधा शुरू की है, जिससे पेंशनभोगी आधार और बायोमेट्रिक सत्यापन के माध्यम से ऑनलाइन ही जीवन प्रमाण पत्र जमा कर सकते हैं। इससे बैंक या कार्यालय जाने की आवश्यकता कम हो जाती है और पेंशन का भुगतान नियमित रूप से जारी रहता है।">
