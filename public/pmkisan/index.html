    <meta property="og:description" content="प्रधानमंत्री किसान सम्मान निधि योजना (PM-KISAN) भारत सरकार द्वारा शुरू की गई एक प्रत्यक्ष लाभ अंतरण (DBT) आधारित योजना है, जिसका उद्देश्य देश के छोटे और सीमांत किसानों को वर्ष में ₹6,000 की आर्थिक सहायता प्रदान करना है। यह राशि तीन किस्तों में ₹2,000-₹2,000 करके सीधे किसानों के बैंक खाते में भेजी जाती है। योजना का लाभ उन्हीं किसानों को मिलता है जिनके पास भूमि का रिकॉर्ड मौजूद हो, जिन्होंने eKYC पूरा किया हो, और जो इनकम टैक्स दाता या सरकारी कर्मचारी न हों। इसका संचालन कृषि एवं किसान कल्याण मंत्रालय द्वारा किया जाता है, और किसान इसकी जानकारी और स्टेटस pmkisan.gov.in वेबसाइट पर देख सकते हैं।">
