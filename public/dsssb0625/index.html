    <meta property="og:description" content="The Delhi Subordinate Services Selection Board (DSSSB) has released Advertisement No. 06/2025 for the recruitment of 5346 teachers in various subjects including Mathematics, English, Science, Social Science, Hindi, Sanskrit, Urdu, Punjabi, Drawing, and Special Education. The online application process begins on 09 October 2025 and continues until 07 November 2025 (11:59 PM) through the official portal https://dsssbonline.nic.in. Eligible candidates must hold a Bachelor’s or Master’s degree in the relevant subject with B.Ed. and CTET (Paper-II) qualification. The pay scale is ₹44,900 – ₹1,42,400 (Level-7, Group B) with a maximum age limit of 30 years, and applicable relaxations as per government rules. The application fee is ₹100 for General/OBC/EWS candidates, while SC/ST/PwBD/Women/Ex-Servicemen are exempted. Selection will be made through a One-Tier Examination (200 Marks) based on subject knowledge and general aptitude. Candidates are advised to read the detailed notification carefully and apply online before the closing date.">
