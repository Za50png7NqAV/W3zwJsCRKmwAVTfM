    <meta property="og:description" content="प्रधानमंत्री विश्वकर्मा योजना भारत सरकार द्वारा पारंपरिक कारीगरों और शिल्पकारों के लिए शुरू की गई एक महत्वाकांक्षी योजना है। इसका उद्देश्य बढ़ई, लोहार, सुनार, कुम्हार, दर्जी, नाई, धोबी और अन्य पारंपरिक व्यवसायों से जुड़े लोगों को पहचान, कौशल प्रशिक्षण, आधुनिक उपकरण, सस्ती ऋण सुविधा और विपणन सहायता प्रदान करना है। योजना के अंतर्गत लाभार्थियों को PM Vishwakarma प्रमाण पत्र एवं आईडी कार्ड, ₹15,000 तक की टूलकिट सहायता, ₹500 प्रतिदिन प्रशिक्षण स्टाइपेंड तथा 5% ब्याज दर पर ₹3 लाख तक का बिना गारंटी ऋण उपलब्ध कराया जाता है। इसके अलावा डिजिटल लेनदेन को बढ़ावा देने और उत्पादों की ब्रांडिंग एवं मार्केटिंग के लिए भी सहायता दी जाती है, जिससे कारीगरों की आय और रोजगार के अवसर बढ़ सकें।">
