    <meta property="og:description" content="The LIC Golden Jubilee Scholarship 2025 provides financial support to meritorious students from Economically Weaker Sections (EWS) for pursuing higher education in India. The scheme covers courses after Class 10 and 12, including Medical, Engineering, Graduation, Vocational, Diploma, and ITI programs. Scholarships are of two types: General Scholarship and Special Scholarship for Girls, with amounts ranging from ₹15,000 to ₹40,000 per annum. Selection is merit-based and income-sensitive, and the scholarship is credited directly to the student’s bank account.">
