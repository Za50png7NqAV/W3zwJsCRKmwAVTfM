    <meta property="og:description" content="The Indian Army has invited applications for the 66th Short Service Commission (Technical) Men Entry for the course commencing in April 2026. A total of 350 vacancies are available for unmarried male engineering graduates in various disciplines including Civil, Mechanical, Electrical, Computer Science, and others. Candidates must be between 20 to 27 years of age as on 01 April 2026. Final year students who will complete their degree before April 2026 are also eligible to apply. The selection process includes shortlisting of applications, SSB interview, medical examination, and merit list preparation. Selected candidates will undergo 49 weeks of training at the Officers Training Academy (OTA), Chennai, and will be commissioned as Lieutenants. During training, cadets will receive a stipend of ₹56,100 per month. The online application process will be open from 24 July 2025 to 22 August 2025 on the official website www.joinindianarmy.nic.in.">
