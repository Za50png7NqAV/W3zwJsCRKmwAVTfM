    <meta property="og:description" content="Union Bank of India has announced the Wealth Manager Recruitment 2025 for 250 Specialist Officer (MMGS-II) vacancies. The post offers a pay scale of ₹64,820–₹93,960 plus allowances, with an approximate CTC of ₹21 lakh in Mumbai. Candidates must be between 25 and 35 years of age as on 1 August 2025, hold a full-time 2-year MBA/MMS/PGDBA/PGDBM/PGPM/PGDM from a recognized institution, and have at least 3 years of experience in Wealth Management at the Officer/Manager level. Desirable certifications include NISM, IRDAI, NCFM, or AMFI. The application process will be open from 5 August to 25 August 2025, with fees of ₹177 for SC/ST/PwBD candidates and ₹1,180 for others. The selection process may include an online examination, group discussion, and personal interview. Selected candidates will serve a probation period of 2 years and must sign a service bond to serve the bank for a minimum of 3 years or pay ₹2,50,000 plus taxes if leaving early.">
