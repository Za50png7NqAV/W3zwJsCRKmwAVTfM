    <meta property="og:description" content="IOCL Apprentice Recruitment 2025–26 for the Northern Region offers 501 state-wise apprentice vacancies for Trade, Technician, and Graduate categories. The online application process will be open from 27 December 2025 to 12 January 2026 via the NAPS/NATS portals. Eligible candidates with 12th, ITI, Diploma, or Graduation qualifications can apply for one discipline only. Selection will be merit-based, and shortlisted candidates will undergo document verification and medical examination. The apprenticeship tenure will be 12 months under Indian Oil Corporation Limited – Marketing Division, Northern Region.">
