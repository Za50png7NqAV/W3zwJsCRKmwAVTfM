    <meta property="og:description" content="MP Gumasta Licence (Shop &amp; Establishment Registration) is a mandatory registration for businesses in Madhya Pradesh. It provides legal recognition to shops, offices, and commercial establishments. Applicants can apply online through the MP Labour Department Portal by filling out the application form, uploading required documents, and paying the prescribed fee. The registration process is simple and usually completed within 3–7 days. Required documents include Aadhaar card, PAN card, address proof, photo, mobile number, and email ID. This licence is essential for running a legal business and is often required for GST registration, opening a business bank account, and availing government benefits.">
