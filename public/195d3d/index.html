    <meta property="og:description" content="The Union Public Service Commission (UPSC) has released Advertisement No. 10/2025 inviting online applications for the post of Assistant Director (Systems) in the Directorate of Income Tax (Systems), Department of Revenue, Ministry of Finance. A total of 45 vacancies are available under various categories including UR, EWS, OBC, SC, ST, and PwBD. The position is classified as Group ‘A’ Gazetted, Non-Ministerial and offers a Level-10 pay scale under the 7th CPC. Candidates with qualifications such as BE/B.Tech, M.Tech, MCA, or equivalent in Computer Science/Applications along with relevant experience in electronic data processing are eligible to apply. The role involves software development, debugging, maintenance, and supervision of technical staff. The headquarters is in New Delhi, but the selected candidates can be posted anywhere in India. The last date to apply online is 14 August 2025, and applications must be submitted through the official website https://upsconline.gov.in/ora/.">
