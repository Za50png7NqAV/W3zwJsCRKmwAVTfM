    <meta property="og:description" content="The Institute of Banking Personnel Selection (IBPS) has released the notification for the post of Deputy Manager – AI Application Developer (Grade E) on a regular basis with posting in Mumbai. The online application process is open from 25/02/2026 to 10/03/2026. Candidates must be between 23 and 30 years of age as on 01/02/2026 and hold a B.E./B.Tech in Computer Science/AI/Data Science/Machine Learning or MCA/M.Sc (Computer Science) along with a minimum of three years of post-qualification experience in AI/ML, Generative AI, LLM fine-tuning, NLP, Python, and database management. The selection process includes an Online Examination, Skill Test, Group Exercise, and Personal Interview. The approximate annual CTC is ₹17.15 lakh, and selected candidates are required to execute a ₹2 lakh service bond for three years.">
