    <meta property="og:description" content="प्रधानमंत्री मुद्रा योजना (PMMY) भारत सरकार की एक प्रमुख ऋण योजना है, जिसका उद्देश्य छोटे व्यवसायों, दुकानदारों, कारीगरों, स्वरोजगार करने वाले व्यक्तियों एवं सूक्ष्म उद्यमों को वित्तीय सहायता प्रदान करना है। इस योजना के तहत पात्र आवेदकों को व्यवसाय शुरू करने, संचालित करने या विस्तार करने के लिए ₹50,000 से ₹20 लाख तक का ऋण उपलब्ध कराया जाता है। ऋण को Shishu, Kishor, Tarun और Tarun Plus श्रेणियों में विभाजित किया गया है ताकि व्यवसाय की आवश्यकता के अनुसार वित्तीय सहायता मिल सके। योजना का संचालन MUDRA (Micro Units Development &amp; Refinance Agency Ltd.) के माध्यम से किया जाता है और इसका मुख्य उद्देश्य स्वरोजगार को बढ़ावा देकर रोजगार के नए अवसर पैदा करना है।">
