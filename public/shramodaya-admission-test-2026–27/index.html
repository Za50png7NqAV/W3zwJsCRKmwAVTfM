    <meta property="og:description" content="Shramodaya Admission Test 2026–27 is conducted for admission to Shramodaya Awasiya Vidyalaya in Madhya Pradesh for Class 6, 7, 8 and 9. The admission is meant for children of registered construction workers under the MP Building and Other Construction Workers Welfare Board. The online application process will be available from 24/12/2025 to 20/01/2026. Selection will be based on an entrance examination, followed by merit-based admission. The exam includes subjects like Hindi, English, Mathematics, Science, Social Science and General Aptitude. Eligible students who qualify the test will get admission to Shramodaya residential schools as per district-wise seat availability.">
