    <meta property="og:description" content="An Indian Passport is an official travel document issued by the Ministry of External Affairs under the provisions of the The Passports Act, 1967, and it is mandatory for international travel. India issues Ordinary, Official, Diplomatic, and e-Passports, with the e-Passport featuring an embedded electronic chip that securely stores biometric data. The standard fee for a 36-page passport is ₹1500 and ₹2000 for a 60-page passport, while minors (below 18 years) pay ₹1000 with validity up to five years or until the age of 18; adult passports are valid for 10 years. The normal processing time is 15–30 days, whereas Tatkaal applications are typically processed within 3–7 days, subject to additional charges and verification procedures.">
