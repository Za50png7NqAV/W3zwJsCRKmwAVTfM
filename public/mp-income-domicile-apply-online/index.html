    <meta property="og:description" content="MP Income Certificate and Domicile Certificate are important government documents issued by the Revenue Department of Madhya Pradesh. The Income Certificate is used to prove the annual income of an individual or family and is required for scholarships, fee concessions, and income-based government schemes. In Madhya Pradesh, the income certificate is valid for 3 years from the date of issue. The Domicile Certificate confirms that a person is a permanent resident of Madhya Pradesh and is mainly required for state government jobs, reservations, and educational admissions. Both certificates can be applied for online through MP Online or CSC centers, and are generally issued within a few working days.">
