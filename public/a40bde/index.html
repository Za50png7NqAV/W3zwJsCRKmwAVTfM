    <meta property="og:description" content="Airports Authority of India (AAI) has announced the AAI Apprentice Recruitment 2025-26 for 20 posts of Graduate and Diploma Apprentices under the Apprentices Act, 1961 at RCDU/FIU/CRSD &amp; E&amp;M Workshop, Safdarjung Airport, New Delhi. Candidates who have completed their BE/B.Tech, BCA, B.Sc, B.Com, BA, BBA, or Diploma (Mechanical, Automobile, EEE, ECE, Instrumentation, Material Management) after 2021 are eligible to apply. The apprenticeship duration will be 1 year, with a monthly stipend of ₹15,000 for graduates and ₹12,000 for diploma holders. Selection will be based on merit and document verification, and applications can be submitted through the NATS portal (nats.education.gov.in) till 24 November 2025. Preference will be given to candidates from the Delhi/NCR region.">
