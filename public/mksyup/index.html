    <meta property="og:description" content="मुख्यमंत्री कन्या सुमंगला योजना उत्तर प्रदेश सरकार की एक प्रमुख कल्याणकारी योजना है, जिसे बालिकाओं के जन्म, शिक्षा और सशक्तिकरण को बढ़ावा देने के उद्देश्य से लागू किया गया है। इस योजना के अंतर्गत पात्र परिवारों की बेटियों को छह चरणों में कुल ₹25,000 तक की आर्थिक सहायता प्रदान की जाती है। योजना बालिका के जन्म से लेकर उच्च शिक्षा तक निरंतर सहयोग देती है, जिससे बाल विवाह, लैंगिक भेदभाव और शिक्षा में बाधाओं को कम करने में मदद मिलती है। इसका संचालन महिला एवं बाल विकास विभाग, उत्तर प्रदेश सरकार द्वारा किया जाता है और लाभ राशि सीधे लाभार्थी के बैंक खाते में DBT के माध्यम से भेजी जाती है।">
