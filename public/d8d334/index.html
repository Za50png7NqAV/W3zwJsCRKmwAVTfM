    <meta property="og:description" content="The Border Security Force (BSF) under the Ministry of Home Affairs has released the Constable (GD) Sports Quota Recruitment 2025 notification for 391 vacancies. Eligible Indian male and female sportspersons who have participated or won medals in recognized National or International competitions (2023–2025) can apply online from 16 October 2025 to 4 November 2025 at rectt.bsf.gov.in. Candidates must have passed Matriculation (10th) and meet prescribed age, physical, and medical standards. The pay scale is Level-3 (₹21,700 – ₹69,100) as per the 7th CPC with admissible allowances. Application fee is ₹159 for UR/OBC male candidates, while SC/ST and female applicants are exempted. Selection will be based on sports merit, documentation, PST, and medical examination.">
