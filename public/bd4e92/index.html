    <meta property="og:description" content="The Delhi Development Authority (DDA) has released its Recruitment Notification 2025 for a total of 1732 vacancies across various posts including Deputy Director, Assistant Director, Junior Engineer, Stenographer, Patwari, Mali, and Multi Tasking Staff (MTS). The online application process is scheduled from 06 October 2025 to 05 November 2025, and the Computer Based Test (CBT) is expected in December 2025 – January 2026. Candidates can apply online through the official DDA website. The recruitment includes category-wise vacancies (UR, EWS, SC, ST, OBC) and posts for ESM / PwBD candidates. Qualifications vary by post, ranging from 10th/12th pass to Graduate/Degree holders in relevant fields.">
