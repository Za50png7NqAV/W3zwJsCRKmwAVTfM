    <meta property="og:description" content="The Railway Recruitment Cell (RRC), West Central Railway has announced 2,865 Apprentice vacancies under Notification No. 01/2025. The online application process will run from 30th August to 29th September 2025. Candidates must have passed 10th Class with at least 50% marks along with an ITI certificate (NCVT/SCVT) in the relevant trade. The age limit is 15 to 24 years with relaxation as per rules. Selection will be purely based on merit (10th &#43; ITI marks). Application fee is ₹141 for UR/OBC/EWS and ₹41 for SC/ST/PwBD/Women. Interested candidates can apply online through the official website wcr.indianrailways.gov.in.">
