    <meta property="og:description" content="Indian Army has released the notification for NCC Special Entry Scheme 124th Course (Oct 2026) for Men under Short Service Commission (Non-Technical). A total of 70 vacancies (63 General &#43; 07 Wards of Battle Casualties) have been announced. Unmarried male graduates with minimum ‘B’ Grade in NCC ‘C’ Certificate are eligible to apply. The selection process includes shortlisting based on NCC grading and graduation marks, followed by SSB interview, medical examination, and merit list. Selected candidates will undergo 49 weeks of training at Officers Training Academy (OTA), Chennai. Online applications will be accepted from 12/02/2026 to 16/03/2026.">
