    <meta property="og:description" content="The Azim Premji Scholarship 2025 is a flagship initiative of the Azim Premji Foundation aimed at supporting girl students from disadvantaged backgrounds to continue their higher education. Under this program, eligible students receive ₹30,000 per year for the entire duration of their first undergraduate degree or diploma course (2–5 years) at recognized government or private colleges across India. To qualify, the applicant must have passed Class 10 and 12 as a regular student from a government school or college and secured admission in the first year of a UG or diploma course for the 2025–26 academic session. The scholarship is open to students from select states and union territories including Arunachal Pradesh, Assam, Bihar, Chhattisgarh, Jharkhand, Karnataka, Madhya Pradesh, Manipur, Meghalaya, Mizoram, Nagaland, Odisha, Puducherry, Rajasthan, Sikkim, Telangana, Tripura, Uttar Pradesh, and Uttarakhand. The application process for the Scholarship Cohort 2025 will begin on 10 September 2025, and candidates must submit documents like a passport-size photograph, Aadhaar card, and signature image. Importantly, there is no application fee, and students are advised to beware of fraud or impostors.">
