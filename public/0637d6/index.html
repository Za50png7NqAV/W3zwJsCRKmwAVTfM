    <meta property="og:description" content="The Collector Office, Damoh (Madhya Pradesh) has released a notification for the recruitment of Office Assistant cum Data Entry Operator (Contractual). There is 1 vacancy, reserved for the Scheduled Caste (SC) category. Candidates must have passed 12th class, hold a valid CPCT score card, and possess typing proficiency in both Hindi and English. A minimum of 3 years of experience in MS Office and database software is required, along with skills in data feeding and document scanning. The applicant must be a domicile of Madhya Pradesh. The application process starts from 15 July 2025 and the last date to apply online via the MPOnline portal is 31 July 2025.">
