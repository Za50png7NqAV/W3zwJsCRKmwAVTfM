    <meta property="og:description" content="SGPGI लखनऊ द्वारा वर्ष 2025 में नर्सिंग ऑफिसर एवं विभिन्न गैर-शिक्षण पदों पर भर्ती हेतु अधिसूचना जारी की गई है। इस भर्ती के अंतर्गत कुल 1479 पदों पर भर्तियाँ की जाएंगी, जिनमें नर्सिंग ऑफिसर, हॉस्पिटल अटेंडेंट, स्टेनोग्राफर, अकाउंट्स ऑफिसर, टेक्निकल ऑफिसर, OT असिस्टेंट, CSSD असिस्टेंट, मेडिकल सोशल सर्विस ऑफिसर जैसे ग्रुप B एवं C श्रेणी के पद शामिल हैं। आवेदन हेतु शैक्षणिक योग्यता 10वीं, 12वीं, स्नातक, डिप्लोमा, B.Sc, B.Com, आदि मांगी गई है, साथ ही कुछ पदों के लिए कार्यानुभव भी आवश्यक है। इस भर्ती के लिए भारत के सभी राज्यों के उम्मीदवार आवेदन कर सकते हैं, लेकिन आरक्षण का लाभ केवल उत्तर प्रदेश के मूल निवासियों को मिलेगा। आवेदन प्रक्रिया केवल ऑनलाइन होगी, और वेतनमान पद के अनुसार निर्धारित होगा। इच्छुक उम्मीदवार विस्तृत जानकारी के लिए आधिकारिक अधिसूचना अवश्य पढ़ें।">
