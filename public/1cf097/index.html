    <meta property="og:description" content="SBI Platinum Jubilee Asha Scholarship 2025 is a national-level scholarship launched by the SBI Foundation under its CSR initiative to support meritorious students from economically weaker families. Under this scheme, students from Class 9 to Postgraduate level can get financial aid up to ₹20 lakh per year. The aim is to help bright students continue their education without financial burden. Eligible students can apply online through the official website sbiashascholarship.co.in from 19 September 2025 to 15 November 2025. The scheme covers school, college, medical, and professional courses with 50% reservation for girl students.">
