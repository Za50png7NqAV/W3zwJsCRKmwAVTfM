    <meta property="og:description" content="Southern Railway and Integral Coach Factory (ICF) invite applications from Indian citizens who are active members of Bharat Scouts &amp; Guides for recruitment to Level-1 posts under the Scouts &amp; Guides Quota for the year 2025-26. A total of 14 posts are available—12 in Southern Railway (2 posts each in Chennai, Tiruchchirappalli, Madurai, Palakkad, Thiruvananthapuram, and Salem) and 2 in ICF. Candidates must have a minimum educational qualification of 10th pass, ITI, or National Apprenticeship Certificate (NAC) from NCVT. The age limit varies by category: UR 18–33 years, OBC 18–36 years, and SC/ST 18–38 years as on 01-01-2026. The selection process includes a Written Test / Computer Based Test (CBT). The application fee is Rs. 500 for general candidates and Rs. 250 for reserved categories, refundable after appearing in the exam. These posts are open to all communities, and eligible candidates can apply online from 30.08.2025 to 29.09.2025.">
