    <meta property="og:description" content="North Western Railway (NWR) Jaipur has released the official notification for 2162 Act Apprentice vacancies under the Apprentices Act 1961 for the year 2025-26. The online application process will start from 03 October 2025 and will remain open till 02 November 2025 at rrcjaipur.in. Candidates must have passed 10th Class with at least 50% marks and hold an ITI certificate in the relevant trade (NCVT/SCVT) to be eligible. The age limit is set between 15 to 24 years with relaxation applicable for SC, ST, OBC, PwBD, and Ex-Servicemen as per government rules. Selection will be done on the basis of a merit list prepared from the average of 10th and ITI marks, without any written exam. The application fee is ₹100 for General/OBC/EWS candidates, while SC/ST, PwBD, and Female candidates are exempted from fees. This recruitment provides an excellent opportunity for ITI qualified youth to gain practical training and build their career with Indian Railways.">
