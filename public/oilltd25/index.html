    <meta property="og:description" content="Oil India Limited, a Maharatna PSU, has released its Recruitment Notification 2025 for a total of 102 vacancies in Grade A, B, and C posts. The vacancies include positions such as Superintending Engineer, Senior Officers in various disciplines (Chemical, Civil, Electrical, Mechanical, IT, Petroleum, HR, Legal, Finance, Public Affairs, Geology, Geophysics, Electronics &amp; Communication, Fire &amp; Safety, HSE, Security, Company Secretary), along with Confidential Secretary and Hindi Officer. Both male and female candidates are eligible to apply. The application process is completely online, starting from 26 August 2025 and closing on 26 September 2025. Candidates will be selected through Computer Based Test (CBT), Personal Interview, and Skill/Proficiency Test as per the post. The recruitment offers attractive pay scales ranging from ₹50,000 to ₹2,20,000 plus allowances, making it a great opportunity for engineering and non-engineering graduates to build a career with Oil India Limited.">
