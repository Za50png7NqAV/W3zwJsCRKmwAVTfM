    <meta property="og:description" content="Chandigarh High Court has invited online applications for 75 posts of Peon (Residential). Eligible candidates with 10th pass qualification, 1-year diploma in cooking/culinary arts, and 3 years of cooking experience can apply from 14 July to 4 August 2025 at www.highcourtchd.gov.in. Applicants from all states are eligible, but reservation and fee relaxation are available only for residents of Punjab, Haryana, and Chandigarh. Selection will be based on a practical test (80 marks) and interview (20 marks). Application fee is ₹700 for general and ₹600 for reserved categories.">
