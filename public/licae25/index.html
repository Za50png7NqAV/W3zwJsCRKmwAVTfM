    <meta property="og:description" content="The Life Insurance Corporation of India (LIC) has announced the LIC AE &amp; AAO Recruitment 2025 for a total of 841 vacancies. The recruitment includes posts for Assistant Engineer (Civil/Electrical), Assistant Administrative Officer (AAO Specialist – CA, CS, Actuarial, Legal, Insurance), and AAO Generalist. The online application process is open from 16/08/2025 to 08/09/2025. The Preliminary Exam will be held on 03/10/2025 followed by the Main Exam on 08/11/2025, while the Interview schedule will be announced later. Candidates with a Bachelor’s Degree in the relevant discipline (Engineering, Law, Finance, Actuarial Science, Company Secretary, Insurance, or any stream for Generalist) are eligible to apply. The application fee is ₹700 &#43; GST &#43; charges for General/OBC/EWS candidates and ₹85 &#43; GST &#43; charges for SC/ST/PwBD candidates. The selection process will be conducted in three stages: Prelims, Mains, and Interview.">
