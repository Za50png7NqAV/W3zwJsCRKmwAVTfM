    <meta property="og:description" content="The Rajasthan Staff Selection Board (RSSB) has invited online applications for the post of Platoon Commander under the Rajasthan Home Guard Department. A total of 84 vacancies are available for this Group B, non-gazetted government job. Candidates must possess a graduation degree, along with knowledge of Hindi written in Devanagari script and familiarity with Rajasthan&rsquo;s culture. Only those who have appeared in the CET (Graduation Level) 2024 exam are eligible to apply. Selected candidates will be placed under a 2-year probation period with fixed monthly remuneration. The pay scale is as per Pay Matrix Level-10 (₹9300–34800 &#43; Grade Pay ₹3600). Applications are accepted online only through the official RSSB portal.">
