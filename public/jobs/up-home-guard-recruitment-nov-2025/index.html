    <meta property="og:description" content="The Uttar Pradesh Home Guard Recruitment 2025 has announced 41,424 vacancies for Home Guard (Male/Female) posts across all districts of the state. The online application process will run from 18 November 2025 to 17 December 2025. Candidates must have passed Class 10 (High School) from a recognized board and must be between 18 to 30 years of age as on 01 July 2025. The selection process includes Physical Standards Test (PST) and Physical Efficiency Test (PET), where male candidates must complete 4.8 km in 28 minutes and female candidates must complete 2.4 km in 16 minutes. The application fee is ₹400 for General/OBC/EWS and ₹300 for SC/ST candidates. The complete district-wise vacancy list and PET/PST rules are provided in the official notification.">
