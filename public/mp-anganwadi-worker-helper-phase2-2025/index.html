    <meta property="og:description" content="MP Anganwadi Recruitment 2025 Phase-2 has been released by the Women and Child Development Department, Madhya Pradesh, for a total of 4767 posts, including 1573 Anganwadi Worker (AWW) and 3194 Anganwadi Helper (AWH) vacancies. The recruitment is conducted through the MP Online selection portal on a district-wise basis. Only eligible female candidates who are residents of the concerned village or ward can apply. The minimum qualification required is 12th pass, and the age limit is 18 to 35 years as on 01/01/2025. The online application process will be open from 31/12/2025 to 10/01/2026, with a correction window up to 12/01/2026. Selection will be merit-based, and no written examination will be conducted.">
