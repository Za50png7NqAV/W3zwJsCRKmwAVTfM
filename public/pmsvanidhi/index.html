    <meta property="og:description" content="PM स्वनिधि योजना केंद्र सरकार द्वारा शुरू की गई एक माइक्रो-क्रेडिट योजना है, जिसका उद्देश्य शहरी क्षेत्रों के स्ट्रीट वेंडर्स (रेहड़ी-पटरी, ठेला, फेरी वाले) को बिना गारंटी कार्यशील पूंजी ऋण प्रदान करना है। इस योजना के तहत पहले ₹15,000, फिर समय पर भुगतान करने पर ₹20,000 और बाद में ₹50,000 तक का लोन दिया जाता है। समय पर किस्त चुकाने पर 7% वार्षिक ब्याज सब्सिडी और डिजिटल लेन-देन पर कैशबैक भी मिलता है। इस योजना का मुख्य लक्ष्य छोटे व्यापारियों को आर्थिक रूप से आत्मनिर्भर बनाना और उन्हें औपचारिक बैंकिंग व डिजिटल भुगतान प्रणाली से जोड़ना है।">
