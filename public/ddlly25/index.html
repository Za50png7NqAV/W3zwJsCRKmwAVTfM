    <meta property="og:description" content="हरियाणा सरकार ने 25 सितंबर 2025 से दीनदयाल लाड़ो लक्ष्मी योजना शुरू की है। इस योजना के तहत 23 वर्ष या उससे अधिक आयु की, वार्षिक आय ₹1 लाख से कम रखने वाली और राज्य में 15 साल से निवास कर रही महिलाओं को ₹2100 प्रतिमाह की वित्तीय सहायता सीधे बैंक खाते में दी जाएगी। सरकारी नौकरी करने वाली, आयकरदाता या अन्य सामाजिक सुरक्षा पेंशन लेने वाली महिलाएँ इस योजना के लिए पात्र नहीं होंगी। आवेदन प्रक्रिया पूरी तरह ऑनलाइन पोर्टल/ऐप से होगी और हर महीने फेस ऑथेंटिकेशन (लाइवनेस डिटेक्शन) जरूरी होगा। यह योजना महिलाओं को आर्थिक सुरक्षा प्रदान कर उन्हें आत्मनिर्भर बनाने का एक बड़ा प्रयास है।">
