    <meta property="og:description" content="Yantra India Limited (YIL) has released the Apprentice Recruitment Notification 2026 for 3979 Trade Apprentice posts, including 2843 Ex-ITI and 1136 Non-ITI vacancies. Eligible candidates who have passed 10th class or ITI can apply online from 01/02/2026 to 03/03/2026 through the official website. Selection will be based on merit, and selected apprentices will receive a monthly stipend of ₹8,200 (Non-ITI) and ₹9,600 (Ex-ITI). This recruitment offers a great opportunity for candidates seeking apprenticeship training in various Ordnance and Ordnance Equipment Factories across India.">
