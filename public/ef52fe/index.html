    <meta property="og:description" content="CPCT (Computer Proficiency Certification Test) मध्यप्रदेश सरकार द्वारा आयोजित एक पात्रता परीक्षा है, जिसका उद्देश्य कंप्यूटर और टाइपिंग कौशल का मूल्यांकन करना है। यह परीक्षा MPSEDC (Madhya Pradesh State Electronics Development Corporation) द्वारा संचालित की जाती है और विभिन्न सरकारी पदों जैसे डाटा एंट्री ऑपरेटर, क्लर्क आदि के लिए अनिवार्य है। इच्छुक अभ्यर्थी cpct.mp.gov.in पर जाकर ऑनलाइन आवेदन कर सकते हैं। परीक्षा में कंप्यूटर ज्ञान, हिंदी/अंग्रेज़ी टाइपिंग टेस्ट और वस्तुनिष्ठ प्रश्न पूछे जाते हैं। आवेदन शुल्क ₹660/- है और प्रमाणपत्र की वैधता 7 वर्ष होती है।">
