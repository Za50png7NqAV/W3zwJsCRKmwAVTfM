    <meta property="og:description" content="Samagra Shiksha, Chandigarh has released a notification for the recruitment of 218 Junior Basic Teacher (JBT) posts for Primary Classes (I to V). Candidates from across India are eligible to apply. The minimum qualification includes a Graduation degree from a recognized university, a 2-year Diploma in Elementary Education (D.El.Ed.) recognized by NCTE, and passing the CTET (Paper-I). The salary for the post is fixed at ₹45,260 per month. The application process is online and will begin on 07 August 2025 and end on 28 August 2025 (5:00 PM), while the last date to pay the fee is 30 August 2025 (2:00 PM). The application fee is ₹1000 for General/OBC/EWS, ₹500 for SC, and exempted for PWD candidates. The selection will be done through a written objective type test of 150 marks, with no interview. Category-wise distribution includes 111 posts for General, 44 for OBC, 41 for SC, and 22 for EWS candidates. Interested applicants must visit the official website ssachd.nic.in to apply and read the full notification.">
