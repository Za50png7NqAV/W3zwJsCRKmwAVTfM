    <meta property="og:description" content="Central Bank of India has released the Apprentice Recruitment 2026 notification for 4500 Apprentice posts under the Apprentices Act, 1961. Interested candidates who have completed a Graduation degree on or after 01 January 2022 and are aged between 20 and 28 years can apply online from 12 June 2026 to 22 June 2026. Selected candidates will undergo 12 months of apprenticeship training and receive a monthly stipend of ₹15,000. The selection process includes an Online Examination, Local Language Test, Document Verification, and Medical Fitness Test. This recruitment offers a valuable opportunity for graduates seeking experience in the banking sector.">
