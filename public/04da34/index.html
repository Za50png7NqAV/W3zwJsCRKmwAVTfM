    <meta property="og:description" content="The Reserve Bank of India (RBI) has released the RBI Assistant Recruitment 2026 notification for 650 Assistant posts. Eligible candidates with a Bachelor’s degree (minimum 50% marks, pass class for SC/ST/PwBD) and knowledge of word processing can apply online from 16/02/2026 to 08/03/2026. The selection process includes a Preliminary Exam, Main Exam and Language Proficiency Test (LPT). The Preliminary Exam is scheduled for 11/04/2026 and the Main Exam for 07/06/2026. The starting basic pay is ₹29,000 with initial gross monthly salary approximately ₹58,514 along with allowances as per RBI rules.">
