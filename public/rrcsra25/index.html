    <meta property="og:description" content="The Railway Recruitment Cell, Southern Railway (RRC SR) has released the official notification for Apprentice Recruitment 2025, offering a total of 3518 apprenticeship slots across various workshops and divisions including Perambur, Golden Rock, Podanur, Chennai, Salem, Madurai, Palakkad, and Trivandrum. Eligible candidates who have passed 10th (50% marks), 12th with Science (for MLT trades), or ITI in relevant trades can apply online from 25 August 2025 to 25 September 2025. The selection will be based on a merit list prepared from academic and ITI marks. Apprentices will receive a stipend of ₹6,000–₹7,000 per month during training. This engagement is purely for apprenticeship training under the Apprentices Act, 1961, and does not guarantee direct employment, though preference will be given in future railway recruitments to candidates who complete the training successfully.">
