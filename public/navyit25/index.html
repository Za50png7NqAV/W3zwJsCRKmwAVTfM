    <meta property="og:description" content="Commission (SSC) in Information Technology (Executive Branch) for the January 2026 course. A total of 15 vacancies are available. Applicants must hold a degree in BE/B.Tech/M.Tech/MCA/MSc in Computer Science, Information Technology, Artificial Intelligence, Cyber Security, or related fields with a minimum of 60% marks, along with at least 60% marks in English in Class 10 or 12. Eligible candidates should be born between 02 January 2001 and 01 July 2006 (both dates inclusive). The online application window opens on 02 August 2025 and closes on 17 August 2025. The selection process includes shortlisting based on normalized marks, SSB interview, medical examination, and merit list. Selected candidates will be appointed as Sub Lieutenants and undergo training at the Indian Naval Academy (INA), Ezhimala, Kerala. The initial service tenure is 10 years, which may be extended up to 14 years (10&#43;2&#43;2) based on performance and service requirements. The basic pay starts at ₹56,100/- plus applicable allowances. For more details and to apply online, visit the official website: www.joinindiannavy.gov.in.">
